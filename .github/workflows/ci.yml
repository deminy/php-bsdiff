name: Build and Test
on: [push, pull_request]
jobs:
  ubuntu:
    strategy:
      matrix:
        version: ["7.2", "7.3", "7.4", "8.0", "8.1", "8.2", "8.3", "8.4"]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout php-bsdiff
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{matrix.version}}
      - name: phpize
        run: phpize
      - name: configure
        run: ./configure --with-libdir=x86_64-linux-gnu
      - name: make
        run: make
      - name: test
        run: make test TESTS="--show-diff tests"
  macos:
    strategy:
      matrix:
        version: ["7.2", "7.3", "7.4", "8.0", "8.1", "8.2", "8.3", "8.4"]
    runs-on: macos-15
    steps:
      - name: Checkout php-bsdiff
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{matrix.version}}
      - name: phpize
        run: phpize
      - name: configure
        run: ./configure --with-bz2=/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr
      - name: make
        run: make
      - name: test
        run: make test TESTS="--show-diff tests"
  windows:
    strategy:
      matrix:
        php-version: ["7.2", "7.3", "7.4", "8.0", "8.1", "8.2", "8.3", "8.4"]
        arch: [x64]
        ts: [nts, ts]
    runs-on: windows-2022
    steps:
      - name: Checkout php-bsdiff
        uses: actions/checkout@v6
      # Packaging and artifact upload are handled automatically by the builder.
      # See https://github.com/php/php-windows-builder
      - name: Build the extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          libs: libbzip2
          args: --enable-bsdiff --with-bz2=..\deps
          run-tests: true
          test-runner-args: "--show-diff tests"
